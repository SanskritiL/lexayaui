<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Lexaya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link crossorigin rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "primary-dim": "#1d4ed8",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#1e3a8a",
                        "secondary": "#475569",
                        "on-surface": "#0f172a",
                        "on-surface-variant": "#475569",
                        "surface": "#ffffff",
                        "surface-container-low": "#f8fafc",
                        "surface-container": "#f1f5f9",
                        "outline": "#64748b",
                        "outline-variant": "#cbd5e1",
                        "error": "#ef4444",
                        "error-container": "#fee2e2",
                        "on-error-container": "#7f1d1d"
                    },
                    fontFamily: {
                        "body": ["Manrope"]
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-[400px]">
        <!-- Brand -->
        <div class="text-center mb-10">
            <a href="/" class="text-3xl font-black tracking-tighter text-slate-900 no-underline">Lexaya</a>
            <p class="text-sm text-slate-500 mt-2">Sign in with your Google account</p>
        </div>

        <!-- Card -->
        <div class="bg-white border border-slate-200 rounded-xl p-8 shadow-lg">
            <button
                type="button"
                id="googleBtn"
                class="w-full py-3.5 bg-primary text-white rounded-lg text-sm font-bold uppercase tracking-widest hover:bg-primary-dim transition-all shadow-lg shadow-primary/20 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3"
            >
                <svg class="w-4 h-4" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81Z"/></svg>
                Continue with Google
            </button>

            <div id="message" class="mt-6 px-4 py-3 rounded-lg text-sm font-medium hidden"></div>

            <div class="mt-8 text-center">
                <a href="/" class="inline-flex items-center gap-2 text-xs uppercase tracking-widest text-slate-400 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    Back to home
                </a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        const googleBtn = document.getElementById('googleBtn');
        const messageEl = document.getElementById('message');

        const urlParams = new URLSearchParams(window.location.search);
        const errorMsg = urlParams.get('error');
        const redirectTo = urlParams.get('redirect') || '/broadcast/';

        if (errorMsg) {
            messageEl.className = 'mt-6 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
            messageEl.textContent = decodeURIComponent(errorMsg).replace(/\+/g, ' ');
            messageEl.classList.remove('hidden');
        }

        // Sign-in lands wherever they were headed. Payment is what unlocks the
        // dashboard, and the Instagram username is collected after checkout —
        // both are enforced by the pages themselves, not here.
        (async () => {
            const user = await auth.getUser();
            if (user) {
                window.location.href = redirectTo;
            }
        })();

        const googleBtnHtml = googleBtn.innerHTML;
        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            googleBtn.textContent = 'Signing in...';

            const { user, error } = await auth.signInWithGoogle();

            if (error) {
                if (error.code !== 'auth/popup-closed-by-user' && error.code !== 'auth/cancelled-popup-request') {
                    messageEl.className = 'mt-6 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
                    messageEl.textContent = error.message;
                    messageEl.classList.remove('hidden');
                }
                googleBtn.disabled = false;
                googleBtn.innerHTML = googleBtnHtml;
            } else if (user) {
                window.location.href = redirectTo;
            }
            // No user and no error: the redirect fallback is navigating away.
        });
    </script>
</body>
</html>
