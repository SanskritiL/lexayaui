<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Lexaya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link crossorigin rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "primary-dim": "#1d4ed8",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#1e3a8a",
                        "secondary": "#475569",
                        "on-surface": "#0f172a",
                        "on-surface-variant": "#475569",
                        "surface": "#ffffff",
                        "surface-container-low": "#f8fafc",
                        "surface-container": "#f1f5f9",
                        "outline": "#64748b",
                        "outline-variant": "#cbd5e1",
                        "error": "#ef4444",
                        "error-container": "#fee2e2",
                        "on-error-container": "#7f1d1d"
                    },
                    fontFamily: {
                        "body": ["Manrope"]
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-[400px]">
        <!-- Brand -->
        <div class="text-center mb-10">
            <a href="/" class="text-3xl font-black tracking-tighter text-slate-900 no-underline">Lexaya</a>
            <p class="text-sm text-slate-500 mt-2">Enter your email to get a magic link</p>
        </div>

        <!-- Card -->
        <div class="bg-white border border-slate-200 rounded-xl p-8 shadow-lg">
            <form id="loginForm">
                <div class="mb-6">
                    <label for="email" class="block text-xs font-bold uppercase tracking-widest text-slate-600 mb-2">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all font-['Manrope']"
                    >
                </div>
                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full py-3.5 bg-primary text-white rounded-lg text-sm font-bold uppercase tracking-widest hover:bg-primary-dim transition-all shadow-lg shadow-primary/20 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Send Magic Link
                </button>
            </form>

            <div id="message" class="mt-6 px-4 py-3 rounded-lg text-sm font-medium hidden"></div>

            <div class="mt-8 text-center">
                <a href="/" class="inline-flex items-center gap-2 text-xs uppercase tracking-widest text-slate-400 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    Back to home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageEl = document.getElementById('message');

        const urlParams = new URLSearchParams(window.location.search);
        const errorMsg = urlParams.get('error');
        const redirectTo = urlParams.get('redirect') || '/members.html';

        if (errorMsg) {
            messageEl.className = 'mt-6 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
            messageEl.textContent = decodeURIComponent(errorMsg).replace(/\+/g, ' ');
            messageEl.classList.remove('hidden');
        }

        (async () => {
            const user = await auth.getUser();
            if (user) {
                window.location.href = redirectTo;
            }
        })();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            const { error } = await auth.sendMagicLink(email, redirectTo);

            if (error) {
                messageEl.className = 'mt-6 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
                messageEl.textContent = error.message;
                messageEl.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Magic Link';
            } else {
                messageEl.className = 'mt-6 px-4 py-3 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200';
                messageEl.textContent = 'Check your email for the magic link!';
                messageEl.classList.remove('hidden');
                submitBtn.textContent = 'Email Sent!';
            }
        });
    </script>
</body>
</html>
