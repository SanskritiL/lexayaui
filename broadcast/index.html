<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lexaya Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link crossorigin rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-bright": "#f9f9f7", "outline": "#777c79", "primary-dim": "#0050ab",
                        "surface-container-highest": "#e0e3e0", "surface-tint": "#005bc2",
                        "on-primary-container": "#000e29", "on-primary": "#f9f8ff",
                        "surface-container-high": "#e6e9e6", "surface": "#f9f9f7",
                        "outline-variant": "#afb3b0", "on-background": "#2f3332",
                        "on-surface": "#2f3332", "surface-container": "#eceeec",
                        "error": "#a83836", "surface-variant": "#e0e3e0",
                        "primary": "#005bc2", "background": "#f9f9f7",
                        "surface-container-low": "#f3f4f2", "surface-container-lowest": "#ffffff",
                        "surface-dim": "#d7dbd8", "primary-container": "#4c8efe",
                        "on-surface-variant": "#5c605e"
                    },
                    borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
                    fontFamily: { headline: ["Manrope"], display: ["Manrope"], body: ["Manrope"], label: ["Manrope"] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .glass { background: rgba(249, 249, 247, 0.8); backdrop-filter: blur(24px); }
        .text-headline-lg { font-size: 2rem; line-height: 1.2; font-weight: 700; }
        .text-headline-sm { font-size: 1.25rem; line-height: 1.4; font-weight: 800; }
        .text-label-md { font-size: 0.875rem; font-weight: 600; letter-spacing: 0.05em; }
        .text-label-sm { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; }
        .ambient-shadow { box-shadow: 0 18px 40px rgba(47, 51, 50, 0.06); }

        .dashboard-grid { display: grid; grid-template-columns: minmax(280px, 0.9fr) minmax(360px, 1.35fr); gap: 1rem; align-items: start; }
        .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: visible; }
        .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 1rem; border-bottom: 1px solid #eef0ee; background: #fbfbfa; }
        .panel-title { margin: 0; font-size: 0.98rem; font-weight: 800; color: #111827; }
        .panel-meta { margin: 0.15rem 0 0; font-size: 0.75rem; color: #6b7280; }
        .panel-body { padding: 1rem; }

        .add-menu-wrap { position: relative; flex-shrink: 0; }
        .btn-primary { border: 0; border-radius: 9px; background: #005bc2; color: #fff; padding: 0.58rem 0.78rem; font-size: 0.78rem; font-weight: 900; display: inline-flex; align-items: center; gap: 0.35rem; cursor: pointer; text-decoration: none; white-space: nowrap; }
        .btn-primary:hover { background: #004a9f; }
        .btn-secondary { border: 1px solid #d1d5db; border-radius: 9px; background: #fff; color: #374151; padding: 0.58rem 0.78rem; font-size: 0.78rem; font-weight: 900; display: inline-flex; align-items: center; gap: 0.35rem; cursor: pointer; text-decoration: none; white-space: nowrap; }
        .btn-secondary:hover { border-color: #9fc6f5; color: #005bc2; background: #f7fbff; }
        .add-menu { position: absolute; right: 0; top: calc(100% + 0.5rem); width: 220px; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 20px 45px rgba(17, 24, 39, 0.12); padding: 0.35rem; z-index: 20; display: none; }
        .add-menu.open { display: grid; gap: 0.2rem; }
        .add-option { width: 100%; border: 0; background: transparent; border-radius: 8px; padding: 0.72rem; cursor: pointer; display: flex; align-items: center; gap: 0.65rem; color: #1f2937; font: inherit; text-align: left; }
        .add-option:hover { background: #f3f7fb; }
        .platform-mark { width: 30px; height: 30px; border-radius: 8px; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
        .platform-mark.youtube { background: #ff0000; }
        .platform-mark.linkedin { background: #0a66c2; }
        .platform-mark.tiktok { background: #000; }
        .platform-mark.instagram { background: #cc2366; }

        .account-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 0.75rem; align-items: stretch; }
        .account-row { position: relative; border: 1px solid #eef0ee; border-radius: 12px; padding: 0.7rem; background: #fff; display: grid; grid-template-columns: 54px minmax(0, 1fr); gap: 0.65rem; align-items: center; min-height: 78px; }
        .account-row.expired { border-color: #fecaca; background: #fff7f7; }
        .account-row.expiring { border-color: #fde68a; background: #fffbeb; }
        .account-portrait { position: relative; width: 54px; height: 54px; flex-shrink: 0; }
        .account-avatar { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; background: #eef0ee; border: 2px solid #fff; box-shadow: 0 0 0 1px #e5e7eb; display: flex; align-items: center; justify-content: center; color: #6b7280; font-size: 0.95rem; font-weight: 900; }
        .account-platform-badge { position: absolute; right: -3px; bottom: -3px; width: 21px; height: 21px; border-radius: 50%; color: #fff; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 0.62rem; box-shadow: 0 4px 10px rgba(17, 24, 39, 0.16); }
        .account-platform-badge.youtube { background: #ff0000; }
        .account-platform-badge.linkedin { background: #0a66c2; }
        .account-platform-badge.tiktok { background: #000; }
        .account-platform-badge.instagram { background: #cc2366; }
        .account-info { min-width: 0; display: grid; gap: 0.25rem; }
        .account-name { font-size: 0.82rem; font-weight: 900; color: #111827; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .account-meta { font-size: 0.7rem; font-weight: 700; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .account-status { width: fit-content; max-width: 100%; border-radius: 999px; padding: 0.18rem 0.48rem; font-size: 0.66rem; font-weight: 900; color: #047857; background: #ecfdf5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .account-status.expired { color: #b91c1c; background: #fee2e2; }
        .account-status.expiring { color: #92400e; background: #fef3c7; }
        .reconnect-button { width: fit-content; border: 1px solid #fecaca; border-radius: 8px; background: #fff; color: #b91c1c; padding: 0.28rem 0.5rem; font-size: 0.68rem; font-weight: 900; display: inline-flex; align-items: center; gap: 0.25rem; cursor: pointer; }
        .reconnect-button:hover { background: #fee2e2; }
        .icon-button { position: absolute; right: -8px; top: -8px; width: 22px; height: 22px; border-radius: 50%; border: 1px solid #e5e7eb; background: #fff; color: #9ca3af; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 0.18s ease, color 0.18s ease, border-color 0.18s ease; }
        .account-row:hover .icon-button, .account-row:focus-within .icon-button { opacity: 1; }
        .icon-button:hover { color: #a83836; border-color: #fecaca; background: #fef2f2; }
        .empty-state { text-align: center; padding: 2rem 1rem; color: #6b7280; }
        .empty-state .material-symbols-outlined { display: block; font-size: 2.5rem; margin-bottom: 0.7rem; color: #9ca3af; }

        .calendar-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end; }
        .calendar-shell { display: grid; gap: 1rem; }
        .calendar-weekdays, .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 0.35rem; }
        .calendar-weekdays span { color: #6b7280; font-size: 0.68rem; font-weight: 900; text-transform: uppercase; text-align: center; }
        .calendar-day { position: relative; min-height: 96px; border: 1px solid #eef0ee; border-radius: 10px; background: #fff; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.3rem; text-align: left; cursor: pointer; color: inherit; font: inherit; }
        .calendar-day:hover { border-color: #9fc6f5; background: #f7fbff; }
        .calendar-day.muted { background: #fbfbfa; color: #a0a7a3; }
        .calendar-day.muted:hover { background: #f7fbff; color: #6b7280; }
        .calendar-day.today { border-color: #005bc2; box-shadow: inset 0 0 0 1px rgba(0, 91, 194, 0.16); }
        .day-number { font-size: 0.74rem; font-weight: 900; }
        .day-head { display: flex; align-items: center; justify-content: space-between; gap: 0.35rem; }
        .day-add { width: 22px; height: 22px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #005bc2; background: #eef5ff; border: 1px solid #d7e8ff; opacity: 0; transform: scale(0.92); transition: opacity 0.16s ease, transform 0.16s ease, background 0.16s ease; }
        .day-add .material-symbols-outlined { font-size: 1rem; }
        .calendar-day:hover .day-add, .calendar-day:focus-visible .day-add, .calendar-day.has-posts .day-add { opacity: 1; transform: scale(1); }
        .calendar-day:hover .day-add { background: #005bc2; color: #fff; border-color: #005bc2; }
        .calendar-day.schedule-disabled { cursor: default; }
        .calendar-day.schedule-disabled .day-add { display: none; }
        .calendar-day.schedule-disabled:hover { border-color: #eef0ee; background: #fff; }
        .calendar-day.schedule-disabled.muted:hover { background: #fbfbfa; color: #a0a7a3; }
        .calendar-event { display: block; border-radius: 6px; background: #eef5ff; color: #005bc2; padding: 0.22rem 0.35rem; font-size: 0.64rem; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .schedule-list { display: grid; gap: 0.7rem; margin-top: 1rem; }
        .schedule-row { border: 1px solid #eef0ee; border-radius: 10px; padding: 0.7rem; display: grid; grid-template-columns: 56px minmax(0, 1fr) auto; gap: 0.75rem; align-items: center; text-decoration: none; color: inherit; }
        .schedule-row:hover { border-color: #9fc6f5; background: #f7fbff; }
        .schedule-thumb { width: 56px; height: 56px; border-radius: 9px; background: #eef0ee; overflow: hidden; display: flex; align-items: center; justify-content: center; color: #7b837f; }
        .schedule-thumb img, .schedule-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .schedule-title { font-size: 0.84rem; font-weight: 900; color: #111827; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .schedule-date { font-size: 0.72rem; color: #6b7280; margin-top: 0.15rem; }
        .platform-dots { display: flex; gap: 0.25rem; }
        .platform-dot { width: 24px; height: 24px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.68rem; }
        .platform-dot.youtube { background: #ff0000; }
        .platform-dot.linkedin { background: #0a66c2; }
        .platform-dot.tiktok { background: #000; }
        .platform-dot.instagram { background: #cc2366; }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); color: white; padding: 0.9rem 1.2rem; border-radius: 10px; display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 1000; transition: opacity 0.3s ease; }
        .history-panel { margin-top: 1rem; }
        .history-list { display: grid; gap: 0.7rem; }
        .history-row { border: 1px solid #e8ebe8; border-radius: 12px; background: #fff; overflow: hidden; }
        .history-summary { list-style: none; display: grid; grid-template-columns: 58px minmax(0, 1fr) auto; gap: 0.85rem; align-items: center; padding: 0.8rem; cursor: pointer; }
        .history-summary::-webkit-details-marker { display: none; }
        .history-summary:hover { background: #fbfdff; }
        .history-thumb { width: 58px; height: 58px; border-radius: 10px; background: #eef0ee; overflow: hidden; display: flex; align-items: center; justify-content: center; color: #7b837f; }
        .history-thumb img, .history-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .history-copy { min-width: 0; }
        .history-caption { color: #111827; font-size: 0.84rem; font-weight: 900; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-time { color: #7b837f; font-size: 0.7rem; margin-top: 0.2rem; }
        .history-platforms { display: flex; flex-wrap: wrap; gap: 0.32rem; margin-top: 0.48rem; }
        .history-platform { display: inline-flex; align-items: center; gap: 0.28rem; border-radius: 999px; padding: 0.22rem 0.48rem; font-size: 0.66rem; font-weight: 900; background: #f3f4f2; color: #5c605e; }
        .history-platform.success { background: #ecfdf5; color: #047857; }
        .history-platform.error, .history-platform.unknown { background: #fef2f2; color: #b91c1c; }
        .history-platform.pending, .history-platform.processing { background: #eef5ff; color: #005bc2; }
        .history-status { min-width: 104px; text-align: right; }
        .history-status-pill { display: inline-flex; align-items: center; gap: 0.28rem; border-radius: 999px; padding: 0.34rem 0.58rem; font-size: 0.68rem; font-weight: 900; }
        .history-status-pill.published { background: #ecfdf5; color: #047857; }
        .history-status-pill.partial { background: #fffbeb; color: #b45309; }
        .history-status-pill.failed { background: #fef2f2; color: #b91c1c; }
        .history-status-pill.publishing { background: #eef5ff; color: #005bc2; }
        .history-details { border-top: 1px solid #eef0ee; padding: 0.8rem; background: #fbfbfa; display: grid; gap: 0.55rem; }
        .history-result { display: grid; grid-template-columns: 32px minmax(0, 1fr) auto; gap: 0.65rem; align-items: start; border: 1px solid #e8ebe8; border-radius: 10px; background: #fff; padding: 0.65rem; }
        .history-result-icon { width: 30px; height: 30px; border-radius: 8px; color: #fff; display: flex; align-items: center; justify-content: center; }
        .history-result-name { font-size: 0.76rem; font-weight: 900; color: #111827; }
        .history-result-message { margin-top: 0.15rem; font-size: 0.69rem; color: #6b7280; word-break: break-word; }
        .history-result-action { color: #005bc2; font-size: 0.69rem; font-weight: 900; text-decoration: none; white-space: nowrap; }
        .history-reconnect { border: 1px solid #f3c7c7; border-radius: 8px; background: #fff; color: #b91c1c; padding: 0.42rem 0.58rem; font-size: 0.69rem; font-weight: 900; cursor: pointer; white-space: nowrap; }
        .history-reconnect:hover { background: #fef2f2; }
        .history-retry { border: 1px solid #f3c7c7; border-radius: 8px; background: #fff; color: #b91c1c; padding: 0.45rem 0.65rem; font-size: 0.7rem; font-weight: 900; cursor: pointer; justify-self: end; }
        .history-retry:disabled { opacity: 0.55; cursor: wait; }
        @media (max-width: 980px) { .dashboard-grid { grid-template-columns: 1fr; } }
        @media (max-width: 640px) {
            .panel-header { align-items: flex-start; flex-direction: column; }
            .add-menu-wrap, .add-menu-wrap .btn-primary { width: 100%; }
            .add-menu { left: 0; right: auto; width: min(100%, 240px); }
            .calendar-actions { width: 100%; justify-content: stretch; }
            .calendar-actions a, .calendar-actions button { flex: 1; justify-content: center; }
            .calendar-day { min-height: 70px; padding: 0.38rem; }
            .day-add { opacity: 1; width: 20px; height: 20px; }
            .calendar-event { display: none; }
            .schedule-row { grid-template-columns: 48px minmax(0, 1fr); }
            .schedule-row .platform-dots { grid-column: 2; }
            .schedule-thumb { width: 48px; height: 48px; }
            .history-summary { grid-template-columns: 48px minmax(0, 1fr); }
            .history-thumb { width: 48px; height: 48px; }
            .history-status { grid-column: 2; text-align: left; }
            .history-result { grid-template-columns: 30px minmax(0, 1fr); }
            .history-result-action { grid-column: 2; }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container antialiased" data-page="dashboard" data-title="Dashboard" data-subtitle="Studio">
    <div id="app-shell"></div>

    <div data-content style="display: none;">
        <div id="success-banner" style="display: none;" class="mb-4 p-4 rounded-xl bg-green-600 text-white"></div>

        <div class="dashboard-grid">
            <section class="panel ambient-shadow">
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title">Connected accounts</h2>
                        <p class="panel-meta" id="accounts-summary">Loading accounts...</p>
                    </div>
                    <div class="add-menu-wrap">
                        <button type="button" class="btn-primary" id="add-account-btn">
                            <span class="material-symbols-outlined text-base">add</span>
                            Add account
                        </button>
                        <div class="add-menu" id="add-account-menu">
                            <button type="button" class="add-option" data-platform="youtube">
                                <span class="platform-mark youtube"><i class="fa-brands fa-youtube"></i></span>
                                <span class="font-extrabold">YouTube</span>
                            </button>
                            <button type="button" class="add-option" data-platform="linkedin">
                                <span class="platform-mark linkedin"><i class="fa-brands fa-linkedin-in"></i></span>
                                <span class="font-extrabold">LinkedIn</span>
                            </button>
                            <button type="button" class="add-option" data-platform="instagram">
                                <span class="platform-mark instagram"><i class="fa-brands fa-instagram"></i></span>
                                <span class="font-extrabold">Instagram</span>
                            </button>
                            <button type="button" class="add-option" data-platform="tiktok">
                                <span class="platform-mark tiktok"><i class="fa-brands fa-tiktok"></i></span>
                                <span class="font-extrabold">TikTok</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="panel-body">
                    <div id="accounts-list" class="account-list">
                        <div class="text-on-surface-variant">Loading accounts...</div>
                    </div>
                </div>
            </section>

            <section class="panel ambient-shadow">
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title" id="calendar-title">Calendar</h2>
                        <p class="panel-meta" id="calendar-summary">Loading scheduled posts...</p>
                    </div>
                    <div class="calendar-actions">
                        <a class="btn-secondary" href="/broadcast/upload.html?scheduled=true" id="schedule-post-link" style="display: none;">
                            <span class="material-symbols-outlined text-base">event</span>
                            Schedule post
                        </a>
                        <a class="btn-primary" href="/broadcast/upload.html">
                            <span class="material-symbols-outlined text-base">edit_square</span>
                            New post
                        </a>
                    </div>
                </div>
                <div class="panel-body calendar-shell">
                    <div class="calendar-weekdays">
                        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
                    </div>
                    <div id="calendar-grid" class="calendar-grid"></div>
                    <div id="schedule-list" class="schedule-list"></div>
                </div>
            </section>
        </div>

        <section class="panel ambient-shadow history-panel" id="publishing-history">
            <div class="panel-header">
                <div>
                    <h2 class="panel-title">Publishing history</h2>
                    <p class="panel-meta" id="history-summary">Loading recent posts...</p>
                </div>
                <a class="btn-primary" href="/broadcast/upload.html">
                    <span class="material-symbols-outlined text-base">add</span>
                    Create post
                </a>
            </div>
            <div class="panel-body">
                <div id="history-list" class="history-list">
                    <div class="text-on-surface-variant">Loading publishing history...</div>
                </div>
            </div>
        </section>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/api-config.js"></script>
    <script src="/js/supabase.js"></script>
    <script>
        const supabaseClient = initSupabase();

        const PLATFORM_NAMES = { youtube: 'YouTube', linkedin: 'LinkedIn', tiktok: 'TikTok', instagram: 'Instagram' };
        const PLATFORM_ICONS = {
            youtube: '<i class="fa-brands fa-youtube"></i>',
            linkedin: '<i class="fa-brands fa-linkedin-in"></i>',
            tiktok: '<i class="fa-brands fa-tiktok"></i>',
            instagram: '<i class="fa-brands fa-instagram"></i>'
        };
        let currentUser = null;
        let currentSession = null;
        let scheduledPosts = [];
        const SCHEDULING_ENABLED = false;

        document.addEventListener('DOMContentLoaded', async () => {
            const oauthResult = checkOAuthCallback();
            if (oauthResult.success) window.LEXAYA_CACHE.invalidate('accounts');
            currentUser = await window.LEXAYA_AUTH.getUser();
            currentSession = await window.LEXAYA_AUTH.getSession();

            if (!currentUser) {
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return;
            }

            setupAddAccountMenu();
            await Promise.all([loadConnectedAccounts(), loadScheduledPosts(), loadPublishingHistory()]);
            // Publishing happens on other pages, so refreshing when the user
            // returns to this tab keeps history fresh without holding a
            // realtime subscription open.
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) loadPublishingHistory();
            });

            if (oauthResult.success) {
                showSuccessBanner(oauthResult.platform);
                await resumeRetryAfterReconnect(oauthResult.platform);
            }
            if (oauthResult.error) showToast(oauthResult.error, 'error');
        });

        function setupAddAccountMenu() {
            const button = document.getElementById('add-account-btn');
            const menu = document.getElementById('add-account-menu');
            if (!button || !menu) return;

            button.addEventListener('click', event => {
                event.stopPropagation();
                menu.classList.toggle('open');
            });
            menu.querySelectorAll('[data-platform]').forEach(option => {
                option.addEventListener('click', () => connectPlatform(option.dataset.platform));
            });
            document.addEventListener('click', () => menu.classList.remove('open'));
        }

        function checkOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const success = params.get('success');
            const platform = params.get('platform');
            const error = params.get('error');
            const result = { success: false, platform: null, error: null };

            if (success === 'true' && platform) {
                result.success = true;
                result.platform = platform;
                window.history.replaceState({}, '', window.location.pathname);
            } else if (error) {
                result.error = `Connection failed: ${error}`;
                window.history.replaceState({}, '', window.location.pathname);
            }
            return result;
        }

        function getAuthApiBase() {
            if (window.LEXAYA_API_BASE_URL !== undefined) return window.LEXAYA_API_BASE_URL;
            return CONFIG.API_BASE_URL || '';
        }

        async function connectPlatform(platform) {
            if (platform === 'instagram' && window.LEXAYA_UI?.confirmInstagramBusiness) {
                const proceed = await window.LEXAYA_UI.confirmInstagramBusiness();
                if (!proceed) return;
            }
            currentSession = await window.LEXAYA_AUTH.getSession();
            const state = currentSession?.access_token;
            if (!state) {
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return;
            }
            window.location.href = `${getAuthApiBase()}/api/broadcast/auth/${platform}?state=${encodeURIComponent(state)}`;
        }

        async function loadConnectedAccounts() {
            // Cached in localStorage (tokens never included) and invalidated
            // on connect/disconnect, so most pageviews skip the DB.
            const { accounts, error } = await window.LEXAYA_DATA.getConnectedAccounts(currentUser.id);
            if (error) showToast('Could not load connected accounts', 'error');
            renderAccounts(accounts);
        }

        function renderAccounts(accounts) {
            const list = document.getElementById('accounts-list');
            const summary = document.getElementById('accounts-summary');
            if (!list || !summary) return;

            const accountStatuses = accounts.map(account => getAccountAuthStatus(account));
            const expiredCount = accountStatuses.filter(status => status.className === 'expired').length;
            const expiringCount = accountStatuses.filter(status => status.className === 'expiring').length;
            summary.textContent = expiredCount
                ? `${accounts.length} connected · ${expiredCount} expired`
                : expiringCount
                    ? `${accounts.length} connected · ${expiringCount} expiring soon`
                    : `${accounts.length} connected`;
            if (!accounts.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined">add_link</span>
                        <p class="font-extrabold text-on-surface mb-1">No accounts connected</p>
                        <p class="text-sm">Add YouTube, LinkedIn, Instagram, or TikTok from the button above.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = accounts.map(account => {
                const metadata = account.metadata || {};
                const platform = account.platform;
                const username = account.account_name || metadata.username || metadata.display_name || metadata.name || PLATFORM_NAMES[platform] || 'Account';
                const displayName = metadata.display_name || metadata.name || username;
                const avatar = getSafeAvatarUrl(metadata.profile_picture || metadata.avatar_url || metadata.profile_image_url);
                const initial = getAccountInitial(displayName);
                const status = getAccountAuthStatus(account);
                const handle = metadata.username || metadata.channel_title || metadata.display_name || account.account_name || '';
                const platformName = PLATFORM_NAMES[platform] || platform;

                return `
                    <div class="account-row ${status.className}" title="${escapeHtml(displayName)} - ${escapeHtml(platformName)} - ${escapeHtml(status.title)}">
                        <div class="account-portrait">
                            ${avatar
                                ? `<img src="${escapeHtml(avatar)}" alt="${escapeHtml(displayName)}" class="account-avatar" onerror="this.outerHTML='<div class=&quot;account-avatar&quot;>${escapeHtml(initial)}</div>';">`
                                : `<div class="account-avatar">${escapeHtml(initial)}</div>`
                            }
                            <span class="account-platform-badge ${escapeHtml(platform)}">${PLATFORM_ICONS[platform] || '<i class="fas fa-link"></i>'}</span>
                        </div>
                        <div class="account-info">
                            <div class="account-name">${escapeHtml(displayName)}</div>
                            <div class="account-meta">${escapeHtml(platformName)}${handle ? ` · @${escapeHtml(handle)}` : ''}</div>
                            <span class="account-status ${status.className}">${escapeHtml(status.label)}</span>
                            ${status.needsReconnect ? `
                                <button type="button" class="reconnect-button" onclick="connectPlatform('${escapeHtml(platform)}')" title="Reconnect ${escapeHtml(displayName)}">
                                    <span class="material-symbols-outlined text-sm">sync</span>
                                    Reconnect
                                </button>
                            ` : ''}
                        </div>
                        <button class="icon-button" onclick="disconnectAccount('${account.id}', '${escapeHtml(platform)}')" title="Disconnect">
                            <span class="material-symbols-outlined text-base">close</span>
                        </button>
                    </div>
                `;
            }).join('');
        }

        async function disconnectAccount(accountId, platform) {
            if (!confirm(`Disconnect ${PLATFORM_NAMES[platform] || platform}?`)) return;
            const { error } = await supabaseClient
                .from('connected_accounts')
                .delete()
                .eq('user_id', currentUser.id)
                .eq('id', accountId);

            if (error) {
                showToast('Failed to disconnect account', 'error');
                return;
            }
            showToast(`${PLATFORM_NAMES[platform] || platform} disconnected`);
            window.LEXAYA_CACHE.invalidate('accounts');
            await loadConnectedAccounts();
        }

        async function loadScheduledPosts() {
            const { data: posts, error } = await supabaseClient
                .from('posts')
                .select('*')
                .eq('user_id', currentUser.id)
                .eq('status', 'scheduled')
                .order('scheduled_at', { ascending: true });

            scheduledPosts = error ? [] : (posts || []);
            renderCalendar(new Date(), scheduledPosts);
            renderScheduleList(scheduledPosts);
        }

        async function loadPublishingHistory() {
            if (!currentUser) return;
            const { data: posts, error } = await supabaseClient
                .from('posts')
                .select('id, video_url, thumbnail_url, caption, platforms, status, platform_results, metadata, created_at, updated_at, published_at')
                .eq('user_id', currentUser.id)
                .neq('status', 'draft')
                .order('created_at', { ascending: false })
                .limit(30);
            renderPublishingHistory(error ? [] : (posts || []), error);
        }

        function renderPublishingHistory(posts, error) {
            const list = document.getElementById('history-list');
            const summary = document.getElementById('history-summary');
            if (!list || !summary) return;
            if (error) {
                summary.textContent = 'Could not load history';
                list.innerHTML = '<div class="empty-state"><span class="material-symbols-outlined">error</span><p>Publishing history is unavailable.</p></div>';
                return;
            }
            summary.textContent = `${posts.length} recent post${posts.length === 1 ? '' : 's'} · expand a post for platform details`;
            if (!posts.length) {
                list.innerHTML = '<div class="empty-state"><span class="material-symbols-outlined">history</span><p class="font-extrabold text-on-surface mb-1">No publishing history yet</p><p class="text-sm">Published and failed posts will appear here.</p></div>';
                return;
            }

            list.innerHTML = posts.map(post => {
                const results = post.platform_results || {};
                const targetKeys = [...new Set([...(post.platforms || []), ...Object.keys(results)])];
                const failedKeys = targetKeys.filter(key => ['error', 'unknown'].includes(results[key]?.status));
                const succeeded = targetKeys.filter(key => results[key]?.status === 'success').length;
                const pending = targetKeys.filter(key => ['pending', 'processing'].includes(results[key]?.status)).length;
                const displayStatus = failedKeys.length && succeeded ? 'partial' : failedKeys.length ? 'failed' : pending ? 'publishing' : 'published';
                const statusLabel = displayStatus === 'published' ? 'Posted' : displayStatus === 'partial' ? 'Partial' : displayStatus === 'failed' ? 'Failed' : 'Processing';
                const statusIcon = displayStatus === 'published' ? 'check_circle' : displayStatus === 'partial' ? 'warning' : displayStatus === 'failed' ? 'error' : 'progress_activity';
                return `
                    <details class="history-row" id="post-${post.id}">
                        <summary class="history-summary">
                            <div class="history-thumb">${renderPostThumb(post)}</div>
                            <div class="history-copy">
                                <div class="history-caption">${escapeHtml(post.caption || 'Untitled post')}</div>
                                <div class="history-time">${escapeHtml(formatHistoryDate(post.published_at || post.created_at))} · ${succeeded} of ${targetKeys.length} posted</div>
                                <div class="history-platforms">
                                    ${targetKeys.map(key => renderHistoryPlatformChip(key, results[key])).join('')}
                                </div>
                            </div>
                            <div class="history-status">
                                <span class="history-status-pill ${displayStatus}"><span class="material-symbols-outlined text-sm">${statusIcon}</span>${statusLabel}</span>
                            </div>
                        </summary>
                        <div class="history-details">
                            ${targetKeys.map(key => renderHistoryResult(post.id, key, results[key])).join('')}
                            ${failedKeys.length ? `<button type="button" class="history-retry" data-retry-post="${post.id}" data-retry-platforms="${escapeHtml(JSON.stringify(failedKeys))}"><span class="material-symbols-outlined text-sm align-text-bottom">refresh</span> Retry ${failedKeys.length === 1 ? 'failed platform' : `${failedKeys.length} failed platforms`}</button>` : ''}
                        </div>
                    </details>`;
            }).join('');

            list.querySelectorAll('[data-retry-post]').forEach(button => {
                button.addEventListener('click', () => retryHistoryPlatforms(button));
            });
            list.querySelectorAll('[data-reconnect-result]').forEach(button => {
                button.addEventListener('click', () => reconnectFailedResult(button));
            });
        }

        function renderHistoryPlatformChip(key, result = {}) {
            const platform = result.platform || String(key).split(':')[0];
            const status = result.status || 'processing';
            const statusIcon = status === 'success' ? '✓' : status === 'error' || status === 'unknown' ? '!' : '•';
            return `<span class="history-platform ${escapeHtml(status)}" title="${escapeHtml(result.error || result.note || result.message || status)}">${PLATFORM_ICONS[platform] || ''}${escapeHtml(PLATFORM_NAMES[platform] || platform)} ${statusIcon}</span>`;
        }

        function renderHistoryResult(postId, key, result = {}) {
            const platform = result.platform || String(key).split(':')[0];
            const name = result.account_name ? `${PLATFORM_NAMES[platform] || platform} · ${result.account_name}` : (PLATFORM_NAMES[platform] || platform);
            const status = result.status || 'processing';
            const message = status === 'success' ? 'Published successfully' : status === 'pending' ? (result.note || 'Processing on platform') : status === 'processing' ? (result.message || 'Publishing in progress') : (result.error || result.note || 'No final status received');
            const requiresAuth = result.error_code === 'AUTH_REQUIRED' || result.error_code === 'AUTH_EXPIRED';
            return `
                <div class="history-result">
                    <span class="history-result-icon platform-mark ${escapeHtml(platform)}">${PLATFORM_ICONS[platform] || '<i class="fas fa-link"></i>'}</span>
                    <div>
                        <div class="history-result-name">${escapeHtml(name)}</div>
                        <div class="history-result-message">${escapeHtml(message)}</div>
                    </div>
                    ${result.url ? `<a class="history-result-action" href="${escapeHtml(result.url)}" target="_blank" rel="noopener">View post ↗</a>` : requiresAuth ? `<button type="button" class="history-reconnect" data-reconnect-result data-post-id="${escapeHtml(postId)}" data-result-key="${escapeHtml(key)}" data-platform="${escapeHtml(platform)}">Reconnect &amp; retry</button>` : ''}
                </div>`;
        }

        function reconnectFailedResult(button) {
            const pendingRetry = {
                postId: button.dataset.postId,
                resultKey: button.dataset.resultKey,
                platform: button.dataset.platform,
                createdAt: Date.now(),
            };
            sessionStorage.setItem('lexaya.pending-auth-retry', JSON.stringify(pendingRetry));
            connectPlatform(pendingRetry.platform);
        }

        async function resumeRetryAfterReconnect(platform) {
            let pendingRetry = null;
            try {
                pendingRetry = JSON.parse(sessionStorage.getItem('lexaya.pending-auth-retry') || 'null');
            } catch (_) {}
            if (!pendingRetry || pendingRetry.platform !== platform) return;
            sessionStorage.removeItem('lexaya.pending-auth-retry');
            if (Date.now() - Number(pendingRetry.createdAt || 0) > 30 * 60 * 1000) return;
            showToast(`Authorization refreshed. Retrying ${PLATFORM_NAMES[platform] || platform}...`);
            await retryPostPlatforms(pendingRetry.postId, [pendingRetry.resultKey]);
        }

        async function retryHistoryPlatforms(button) {
            const postId = button.dataset.retryPost;
            let platforms = [];
            try { platforms = JSON.parse(button.dataset.retryPlatforms || '[]'); } catch (_) {}
            if (!postId || !platforms.length) return;
            await retryPostPlatforms(postId, platforms, button);
        }

        async function retryPostPlatforms(postId, platforms, button = null) {
            const original = button?.innerHTML || '';
            if (button) {
                button.disabled = true;
                button.textContent = 'Retrying...';
            }
            try {
                const session = await window.LEXAYA_AUTH.getSession();
                if (!session?.access_token) throw new Error('Sign in again to retry.');
                const response = await fetch(API.publish(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
                    body: JSON.stringify({ postId, platforms }),
                });
                const body = await response.json().catch(() => ({}));
                if (!response.ok) throw new Error(body.error || 'Retry failed');
                showToast('Retry finished. Platform statuses were refreshed.');
                await loadPublishingHistory();
            } catch (retryError) {
                showToast(retryError.message || 'Retry failed', 'error');
                if (button) {
                    button.disabled = false;
                    button.innerHTML = original;
                }
            }
        }

        function formatHistoryDate(value) {
            return new Date(value).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
        }

        function renderCalendar(date, posts) {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('calendar-title');
            const summary = document.getElementById('calendar-summary');
            if (!grid || !title || !summary) return;

            const year = date.getFullYear();
            const month = date.getMonth();
            title.textContent = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            summary.textContent = `${posts.length} scheduled post${posts.length === 1 ? '' : 's'}`;

            const firstDay = new Date(year, month, 1);
            const start = new Date(firstDay);
            start.setDate(1 - firstDay.getDay());
            const todayKey = dateKey(new Date());

            const cells = [];
            for (let i = 0; i < 42; i += 1) {
                const cellDate = new Date(start);
                cellDate.setDate(start.getDate() + i);
                const key = dateKey(cellDate);
                const dayPosts = posts.filter(post => dateKey(new Date(post.scheduled_at)) === key);
                cells.push(`
                    <button type="button" class="calendar-day ${cellDate.getMonth() === month ? '' : 'muted'} ${key === todayKey ? 'today' : ''} ${dayPosts.length ? 'has-posts' : ''} ${SCHEDULING_ENABLED ? '' : 'schedule-disabled'}" ${SCHEDULING_ENABLED ? `onclick="openScheduleComposer('${key}')"` : ''} title="${SCHEDULING_ENABLED ? `Schedule a post on ${key}` : 'Scheduling is currently off'}">
                        <span class="day-head">
                            <span class="day-number">${cellDate.getDate()}</span>
                            <span class="day-add" aria-hidden="true"><span class="material-symbols-outlined">add</span></span>
                        </span>
                        ${dayPosts.slice(0, 2).map(post => `<span class="calendar-event">${escapeHtml(formatEventTime(post.scheduled_at))} ${escapeHtml(post.caption || 'Scheduled post')}</span>`).join('')}
                    </button>
                `);
            }
            grid.innerHTML = cells.join('');
        }

        function renderScheduleList(posts) {
            const list = document.getElementById('schedule-list');
            if (!list) return;
            if (!posts.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <span class="material-symbols-outlined">event_available</span>
                        <p class="font-extrabold text-on-surface mb-1">Nothing scheduled</p>
                        <p class="text-sm">${SCHEDULING_ENABLED ? 'Use Schedule post to pick a channel, caption, and publish time.' : 'Scheduled publishing is currently off.'}</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = posts.slice(0, 5).map(post => `
                <a class="schedule-row" href="/broadcast/scheduled.html" title="View scheduled post details">
                    <div class="schedule-thumb">
                        ${renderPostThumb(post)}
                    </div>
                    <div class="min-w-0">
                        <div class="schedule-title">${escapeHtml(post.caption || 'Scheduled post')}</div>
                        <div class="schedule-date">${formatScheduledDate(post.scheduled_at)}</div>
                    </div>
                    <div class="platform-dots">
                        ${(post.platforms || []).map(platform => `
                            <span class="platform-dot ${escapeHtml(platform)}" title="${escapeHtml(PLATFORM_NAMES[platform] || platform)}">${PLATFORM_ICONS[platform] || '<i class="fas fa-link"></i>'}</span>
                        `).join('')}
                    </div>
                </a>
            `).join('');
        }

        function openScheduleComposer(date) {
            window.location.href = `/broadcast/upload.html?scheduled=true&date=${encodeURIComponent(date)}`;
        }

        function renderPostThumb(post) {
            const mediaType = post.metadata?.media_type || '';
            const thumb = post.thumbnail_url || '';
            const media = post.video_url || '';
            if (thumb) return `<img src="${escapeHtml(thumb)}" alt="">`;
            if (mediaType === 'image' && media) return `<img src="${escapeHtml(media)}" alt="">`;
            if (mediaType === 'video' && media) return `<video src="${escapeHtml(media)}" muted preload="metadata"></video>`;
            return '<span class="material-symbols-outlined">article</span>';
        }

        function getSafeAvatarUrl(url) {
            if (!url) return '';
            try {
                return new URL(url).href;
            } catch (_) {
                return '';
            }
        }

        function getAccountInitial(name) {
            return String(name || 'A').trim().charAt(0).toUpperCase() || 'A';
        }

        function getAccountAuthStatus(account) {
            const expiresAt = new Date(account?.token_expires_at || '').getTime();
            if (!Number.isFinite(expiresAt)) {
                if (needsExpiringOAuth(account) && !canRefreshAccountForPublish(account)) {
                    return { className: 'expired', label: 'Reconnect required', title: 'Authorization needs to be refreshed', needsReconnect: true };
                }
                return { className: '', label: 'Connected', title: 'No expiration date reported', needsReconnect: false };
            }

            const dateLabel = new Date(expiresAt).toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
            });

            if (canRefreshAccountForPublish(account)) {
                return { className: '', label: 'Auto-refresh', title: `Authorization refreshes automatically. Current access token expires ${dateLabel}`, needsReconnect: false };
            }

            if (expiresAt <= Date.now()) {
                return { className: 'expired', label: `Expired ${dateLabel}`, title: `Authorization expired ${dateLabel}`, needsReconnect: true };
            }

            if (expiresAt <= Date.now() + (24 * 60 * 60 * 1000)) {
                return { className: 'expiring', label: `Expires ${dateLabel}`, title: `Authorization expires ${dateLabel}`, needsReconnect: true };
            }

            return { className: '', label: `Connected`, title: `Authorization expires ${dateLabel}`, needsReconnect: false };
        }

        function canRefreshAccountForPublish(account) {
            return Boolean(account?.refresh_token && ['tiktok', 'youtube'].includes(account.platform));
        }

        function needsExpiringOAuth(account) {
            return ['tiktok', 'youtube'].includes(account?.platform);
        }

        function dateKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function formatScheduledDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) +
                ' at ' + date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }

        function formatEventTime(dateStr) {
            return new Date(dateStr).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[char]));
        }

        function showSuccessBanner(platform) {
            const banner = document.getElementById('success-banner');
            if (!banner) return;
            banner.innerHTML = `<i class="fas fa-check-circle"></i> <strong>${PLATFORM_NAMES[platform] || platform}</strong> connected successfully.`;
            banner.style.display = 'block';
            setTimeout(() => { banner.style.display = 'none'; }, 5000);
        }

        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? '#10b981' : '#dc2626';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${escapeHtml(message)}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
    <script src="/js/layout.js"></script>
</body>
</html>
