<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar — Lexaya Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link crossorigin rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-bright": "#f9f9f7", "tertiary": "#695781", "on-primary-fixed-variant": "#001b42",
                        "outline": "#777c79", "primary-dim": "#0050ab", "error-dim": "#67040d",
                        "surface-container-highest": "#e0e3e0", "surface-tint": "#005bc2", "inverse-surface": "#0d0f0e",
                        "tertiary-container": "#e4ceff", "secondary": "#575f72", "on-primary-container": "#000e29",
                        "on-secondary-container": "#4a5264", "on-error": "#fff7f6", "inverse-primary": "#4c8efe",
                        "tertiary-fixed-dim": "#d6c0f0", "tertiary-fixed": "#e4ceff", "on-tertiary-fixed": "#403057",
                        "secondary-fixed": "#dbe2f9", "on-primary": "#f9f8ff", "surface-container-high": "#e6e9e6",
                        "on-tertiary-fixed-variant": "#5d4d75", "on-secondary-fixed": "#373f51",
                        "surface": "#f9f9f7", "outline-variant": "#afb3b0", "on-primary-fixed": "#000000",
                        "primary-fixed-dim": "#3c81f0", "primary-fixed": "#4c8efe", "on-secondary": "#f9f8ff",
                        "on-tertiary-container": "#54436b", "on-background": "#2f3332", "on-surface": "#2f3332",
                        "surface-container": "#eceeec", "error": "#a83836", "surface-variant": "#e0e3e0",
                        "tertiary-dim": "#5c4b74", "primary": "#005bc2", "on-error-container": "#6e0a12",
                        "background": "#f9f9f7", "surface-container-low": "#f3f4f2",
                        "on-secondary-fixed-variant": "#545b6e", "surface-container-lowest": "#ffffff",
                        "surface-dim": "#d7dbd8", "primary-container": "#4c8efe", "error-container": "#fa746f",
                        "secondary-fixed-dim": "#cdd4ea", "secondary-dim": "#4b5366",
                        "on-surface-variant": "#5c605e", "secondary-container": "#dbe2f9",
                        "on-tertiary": "#fef6ff", "inverse-on-surface": "#9c9d9b"
                    },
                    borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
                    fontFamily: { headline: ["Manrope"], display: ["Manrope"], body: ["Manrope"], label: ["Manrope"] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .glass { background: rgba(249, 249, 247, 0.8); backdrop-filter: blur(24px); }
        .text-headline-sm { font-size: 1.25rem; line-height: 1.4; font-weight: 800; }
        .text-label-md { font-size: 0.875rem; font-weight: 600; letter-spacing: 0.05em; }
        .text-label-sm { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; }
        .ambient-shadow { box-shadow: 0px 24px 48px rgba(47, 51, 50, 0.06); }

        .stat-value { font-size: 2rem; font-weight: 800; line-height: 1; }

        .calendar-day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 0.5rem; font-size: 0.85rem; font-weight: 600;
            transition: all 0.2s; cursor: default; position: relative;
        }
        .calendar-day.empty { background: transparent; }
        .calendar-day.normal { background: #eceeec; color: #5c605e; }
        .calendar-day.normal:hover { background: #e0e3e0; }
        .calendar-day.posted {
            background: #22c55e; color: white;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
        }
        .calendar-day.today { outline: 2px solid #005bc2; outline-offset: -2px; font-weight: 700; }
        .calendar-day.today.posted { background: #22c55e; color: white; outline: 2px solid #005bc2; }

        @keyframes streak-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(245, 158, 11, 0.2); }
        }
        .celebrating { animation: streak-glow 1.5s ease-in-out infinite; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased" data-page="scheduler" data-title="Calendar" data-subtitle="Scheduler">
    <div id="app-shell"></div>

    <div data-content style="display: none;">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-surface-container-lowest rounded-xl p-8 ambient-shadow">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-white font-bold text-lg" id="current-streak">0</div>
                    <div>
                        <p class="stat-value text-primary" id="current-streak-value">0</p>
                        <p class="text-label-sm text-on-surface-variant uppercase">Day Streak</p>
                    </div>
                </div>
            </div>
            <div class="bg-surface-container-lowest rounded-xl p-8 ambient-shadow">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center text-white font-bold text-lg" id="total-posts-icon">0</div>
                    <div>
                        <p class="stat-value text-green-600" id="total-posts">0</p>
                        <p class="text-label-sm text-on-surface-variant uppercase">Total Posts</p>
                    </div>
                </div>
            </div>
            <div class="bg-surface-container-lowest rounded-xl p-8 ambient-shadow">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center">
                        <span class="material-symbols-outlined text-amber-600">local_fire_department</span>
                    </div>
                    <div>
                        <p class="stat-value text-amber-600" id="this-month-posts">0</p>
                        <p class="text-label-sm text-on-surface-variant uppercase">This Month</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Calendar -->
        <div class="bg-surface-container-lowest rounded-xl p-8 ambient-shadow max-w-xl">
            <div class="flex items-center justify-between mb-6">
                <button id="prev-month" class="w-10 h-10 rounded-xl border border-outline-variant flex items-center justify-center hover:bg-surface-container transition-all text-on-surface">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <h2 id="month-year" class="text-lg font-bold text-on-surface"></h2>
                <button id="next-month" class="w-10 h-10 rounded-xl border border-outline-variant flex items-center justify-center hover:bg-surface-container transition-all text-on-surface">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>

            <div class="grid grid-cols-7 gap-1 mb-2">
                <div class="text-center text-[10px] font-bold uppercase tracking-wider text-primary">S</div>
                <div class="text-center text-[10px] font-bold uppercase tracking-wider text-primary">M</div>
                <div class="text-center text-[10px] font-bold uppercase tracking-wider text-primary">T</div>
                <div class="text-center text-[10px] font-bold uppercase tracking-wider text-primary">W</div>
                <div class="text-center text-[10px] font-bold uppercase tracking-wider text-primary">T</div>
                <div class="text-center text-[10px] font-bold uppercase tracking-wider text-primary">F</div>
                <div class="text-center text-[10px] font-bold uppercase tracking-wider text-primary">S</div>
            </div>

            <div class="grid grid-cols-7 gap-1" id="calendar-days"></div>

            <div class="flex justify-center gap-6 mt-6 text-xs text-on-surface-variant">
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-green-500"></span>Posted</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded border-2 border-primary bg-white"></span>Today</span>
            </div>
        </div>

        <!-- Create Post CTA -->
        <div class="mt-12 text-center">
            <a href="/broadcast/upload.html" class="inline-flex items-center gap-3 px-10 py-4 rounded-xl bg-primary text-on-primary text-sm font-bold hover:bg-primary-dim transition-all shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined">add</span>
                Create New Post
            </a>
        </div>
    </div>

    <script>
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        let currentUser = null;
        const ADMIN_EMAILS = ['sanslamsal16@gmail.com'];
        let currentDate = new Date();
        let allPosts = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            currentUser = user;

            if (!currentUser) {
                currentUser = { id: 'dev-local', email: 'sanslamsal16@gmail.com' };
            }

            await waitForContent();
            await loadAllPosts();
            renderCalendar();

            document.getElementById('prev-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });
            document.getElementById('next-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });
        });

        function waitForContent() {
            return new Promise(resolve => {
                const check = () => {
                    if (document.getElementById('calendar-days')) return resolve();
                    setTimeout(check, 50);
                };
                check();
            });
        }

        async function loadAllPosts() {
            const { data: posts, error } = await supabaseClient
                .from('posts')
                .select('created_at, published_at, status, platforms')
                .eq('user_id', currentUser.id)
                .in('status', ['published', 'partial'])
                .order('created_at', { ascending: false });

            allPosts = error ? [] : (posts || []);

            // Stats
            document.getElementById('total-posts').textContent = allPosts.length;
            document.getElementById('total-posts-icon').textContent = allPosts.length;

            const streak = calculateStreak();
            document.getElementById('current-streak').textContent = streak;
            document.getElementById('current-streak-value').textContent = streak;

            if (streak >= 7) {
                document.getElementById('current-streak').closest('.bg-surface-container-lowest').classList.add('celebrating');
            }

            // This month count
            const now = new Date();
            const thisMonth = allPosts.filter(p => {
                const d = new Date(p.created_at);
                return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
            });
            document.getElementById('this-month-posts').textContent = thisMonth.length;
        }

        function calculateStreak() {
            if (allPosts.length === 0) return 0;
            const postDays = new Set();
            allPosts.forEach(post => postDays.add(new Date(post.created_at).toDateString()));

            let streak = 0;
            let checkDate = new Date();
            if (!postDays.has(checkDate.toDateString())) {
                checkDate.setDate(checkDate.getDate() - 1);
                if (!postDays.has(checkDate.toDateString())) return 0;
            }
            while (postDays.has(checkDate.toDateString())) {
                streak++;
                checkDate.setDate(checkDate.getDate() - 1);
            }
            return streak;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('month-year').textContent = `${monthNames[month]} ${year}`;

            const monthPosts = {};
            allPosts.forEach(post => {
                const date = new Date(post.created_at);
                if (date.getFullYear() === year && date.getMonth() === month) {
                    monthPosts[date.getDate()] = true;
                }
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            let html = '';
            for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day empty"></div>';

            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                const hasPost = monthPosts[day];
                let classes = 'calendar-day';
                if (hasPost && isToday) classes += ' today posted';
                else if (isToday) classes += ' today';
                else if (hasPost) classes += ' posted';
                else classes += ' normal';
                html += `<div class="${classes}">${day}</div>`;
            }

            document.getElementById('calendar-days').innerHTML = html;
        }
    </script>
</body>
</html>
