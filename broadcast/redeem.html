<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redeem a code — Lexaya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link crossorigin rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "primary-dim": "#1d4ed8",
                        "on-primary": "#ffffff",
                        "surface": "#ffffff",
                        "on-surface": "#0f172a"
                    },
                    fontFamily: { "body": ["Manrope"] },
                    borderRadius: { DEFAULT: "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" }
                }
            }
        }
    </script>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-[480px]">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-black tracking-tighter text-slate-900 no-underline">Lexaya</a>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-8 shadow-lg">
            <h1 class="text-2xl font-bold tracking-tight text-slate-900 mb-3">Redeem an access code</h1>
            <p class="text-slate-500 leading-relaxed mb-6">
                Got a code? Enter it below to unlock Lexaya on your account — no card needed.
            </p>

            <form id="redeem-form">
                <label for="code" class="block text-sm font-semibold text-slate-900 mb-2">Access code</label>
                <input
                    type="text"
                    id="code"
                    name="code"
                    placeholder="LEXAYA-XXXXXX"
                    autocomplete="off"
                    autocapitalize="characters"
                    spellcheck="false"
                    required
                    class="w-full py-3.5 px-4 border border-slate-300 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 text-slate-900 placeholder:text-slate-300 uppercase tracking-widest"
                >

                <div id="message" class="mt-5 px-4 py-3 rounded-lg text-sm font-medium hidden"></div>

                <button
                    type="submit"
                    id="submit-btn"
                    class="mt-6 w-full py-3.5 bg-primary text-white rounded-lg text-sm font-bold uppercase tracking-widest hover:bg-primary-dim transition-all shadow-lg shadow-primary/20 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Redeem
                </button>
            </form>

            <p class="mt-6 text-sm text-slate-400 text-center">
                No code? <a href="/broadcast/pricing.html" class="text-primary font-semibold no-underline hover:underline">See the plans</a>
            </p>
        </div>

        <div class="mt-6 text-center">
            <a href="/" class="inline-flex items-center gap-2 text-xs uppercase tracking-widest text-slate-400 hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to home
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js"></script>
    <script src="/js/api-config.js"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/entitlements.js"></script>
    <script>
        initSupabase();

        const form = document.getElementById('redeem-form');
        const messageEl = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');

        const params = new URLSearchParams(window.location.search);
        // Once redeemed, mirror the post-checkout flow: collect the Instagram
        // username on beta.html, which then sends them to the dashboard.
        const next = params.get('next') || '/broadcast/beta.html?subscribed=1';
        let session = null;

        document.addEventListener('DOMContentLoaded', async () => {
            session = await window.LEXAYA_AUTH.getSession();
            if (!session) {
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return;
            }
            // Pre-fill a code passed in the link, e.g. /broadcast/redeem.html?code=LEXAYA-ABC123
            const preset = params.get('code');
            if (preset) document.getElementById('code').value = preset;
        });

        function showMessage(text, isError) {
            messageEl.textContent = text;
            messageEl.className = isError
                ? 'mt-5 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700'
                : 'mt-5 px-4 py-3 rounded-lg text-sm font-medium bg-green-50 text-green-700';
            messageEl.classList.remove('hidden');
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const code = document.getElementById('code').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Redeeming…';
            messageEl.classList.add('hidden');

            try {
                const response = await fetch(API.redeem(), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${session.access_token}`,
                    },
                    body: JSON.stringify({ code }),
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "That code isn't valid.");

                // The tier just changed; drop the cached value so the next page
                // reads the new access.
                window.LEXAYA_CACHE.invalidate('tier');

                const planName = data.tier === 'pro' ? 'Lexaya Pro' : 'Get Lexaya';
                showMessage(`You're in — ${planName} unlocked. Taking you to setup…`, false);
                setTimeout(() => { window.location.href = next; }, 1200);
            } catch (error) {
                showMessage(error.message, true);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Redeem';
            }
        });
    </script>
</body>
</html>
