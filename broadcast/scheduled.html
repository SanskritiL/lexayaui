<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduled Posts — Lexaya Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link crossorigin rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-bright": "#f9f9f7", "tertiary": "#695781", "on-primary-fixed-variant": "#001b42",
                        "outline": "#777c79", "primary-dim": "#0050ab", "error-dim": "#67040d",
                        "surface-container-highest": "#e0e3e0", "surface-tint": "#005bc2", "inverse-surface": "#0d0f0e",
                        "tertiary-container": "#e4ceff", "secondary": "#575f72", "on-primary-container": "#000e29",
                        "on-secondary-container": "#4a5264", "on-error": "#fff7f6", "inverse-primary": "#4c8efe",
                        "tertiary-fixed-dim": "#d6c0f0", "tertiary-fixed": "#e4ceff", "on-tertiary-fixed": "#403057",
                        "secondary-fixed": "#dbe2f9", "on-primary": "#f9f8ff", "surface-container-high": "#e6e9e6",
                        "on-tertiary-fixed-variant": "#5d4d75", "on-secondary-fixed": "#373f51",
                        "surface": "#f9f9f7", "outline-variant": "#afb3b0", "on-primary-fixed": "#000000",
                        "primary-fixed-dim": "#3c81f0", "primary-fixed": "#4c8efe", "on-secondary": "#f9f8ff",
                        "on-tertiary-container": "#54436b", "on-background": "#2f3332", "on-surface": "#2f3332",
                        "surface-container": "#eceeec", "error": "#a83836", "surface-variant": "#e0e3e0",
                        "tertiary-dim": "#5c4b74", "primary": "#005bc2", "on-error-container": "#6e0a12",
                        "background": "#f9f9f7", "surface-container-low": "#f3f4f2",
                        "on-secondary-fixed-variant": "#545b6e", "surface-container-lowest": "#ffffff",
                        "surface-dim": "#d7dbd8", "primary-container": "#4c8efe", "error-container": "#fa746f",
                        "secondary-fixed-dim": "#cdd4ea", "secondary-dim": "#4b5366",
                        "on-surface-variant": "#5c605e", "secondary-container": "#dbe2f9",
                        "on-tertiary": "#fef6ff", "inverse-on-surface": "#9c9d9b"
                    },
                    borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
                    fontFamily: { headline: ["Manrope"], display: ["Manrope"], body: ["Manrope"], label: ["Manrope"] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .glass { background: rgba(249, 249, 247, 0.8); backdrop-filter: blur(24px); }
        .text-headline-sm { font-size: 1.25rem; line-height: 1.4; font-weight: 800; }
        .text-label-md { font-size: 0.875rem; font-weight: 600; letter-spacing: 0.05em; }
        .text-label-sm { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; }
        .ambient-shadow { box-shadow: 0px 24px 48px rgba(47, 51, 50, 0.06); }

        .post-card { transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-2px); box-shadow: 0 24px 48px rgba(47, 51, 50, 0.1); }
        .scheduled-card { display: grid; grid-template-columns: 148px minmax(0, 1fr) auto; gap: 1rem; align-items: stretch; }
        .scheduled-media { width: 148px; aspect-ratio: 4 / 5; border-radius: 12px; background: #eef0ee; overflow: hidden; display: flex; align-items: center; justify-content: center; color: #777c79; }
        .scheduled-media img, .scheduled-media video { width: 100%; height: 100%; object-fit: cover; }
        .scheduled-meta { display: flex; flex-wrap: wrap; gap: 0.55rem; margin-top: 0.75rem; }
        .meta-chip { display: inline-flex; align-items: center; gap: 0.32rem; min-height: 30px; padding: 0.35rem 0.62rem; border-radius: 999px; background: #f3f4f2; color: #5c605e; font-size: 0.75rem; font-weight: 800; }
        .platform-chip { display: inline-flex; align-items: center; gap: 0.38rem; min-height: 32px; padding: 0.4rem 0.7rem; border-radius: 999px; color: #fff; font-size: 0.75rem; font-weight: 900; }
        .platform-chip.tiktok { background: #000; }
        .platform-chip.instagram { background: linear-gradient(45deg,#f09433,#dc2743,#bc1888); }
        .platform-chip.linkedin { background: #0A66C2; }
        .platform-chip.youtube { background: #FF0000; }
        .caption-preview { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; white-space: pre-wrap; }
        @media (max-width: 720px) {
            .scheduled-card { grid-template-columns: 96px minmax(0, 1fr); }
            .scheduled-media { width: 96px; }
            .scheduled-actions { grid-column: 1 / -1; display: flex; justify-content: flex-end; }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased" data-page="scheduler" data-title="Scheduled Posts" data-subtitle="Scheduler">
    <div id="app-shell"></div>

    <div data-content style="display: none;">
        <div id="scheduled-posts" class="space-y-4">
            <div class="text-center py-20 text-on-surface-variant">
                <span class="material-symbols-outlined text-5xl mb-4 block">schedule</span>
                <p>Loading scheduled posts...</p>
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/layout.js"></script>
    <script>
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, { realtime: { transport: window.WebSocket } });

        const PLATFORM_ICONS = {
            tiktok: '<i class="fa-brands fa-tiktok"></i>',
            instagram: '<i class="fa-brands fa-instagram"></i>',
            linkedin: '<i class="fa-brands fa-linkedin-in"></i>',
            youtube: '<i class="fa-brands fa-youtube"></i>'
        };
        const PLATFORM_NAMES = { tiktok: 'TikTok', instagram: 'Instagram', linkedin: 'LinkedIn', youtube: 'YouTube' };
        const ADMIN_EMAILS = ['sanslamsal6@gmail.com'];
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await supabaseClient.auth.getUser();
            currentUser = user;
            if (!currentUser) {
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return;
            }

            await waitForContent();
            await loadScheduledPosts();
        });

        function waitForContent() {
            return new Promise(resolve => {
                const check = () => {
                    if (document.getElementById('scheduled-posts')) return resolve();
                    setTimeout(check, 50);
                };
                check();
            });
        }

        async function loadScheduledPosts() {
            const container = document.getElementById('scheduled-posts');
            if (!currentUser) return;

            const { data: posts, error } = await supabaseClient
                .from('posts')
                .select('*')
                .eq('user_id', currentUser.id)
                .eq('status', 'scheduled')
                .order('scheduled_at', { ascending: true });

            if (error) {
                container.innerHTML = `<div class="text-center py-20 text-error">
                    <span class="material-symbols-outlined text-5xl mb-4 block">error</span>
                    <p class="font-bold">Error loading posts</p>
                </div>`;
                return;
            }

            if (!posts || posts.length === 0) {
                container.innerHTML = `<div class="text-center py-20">
                    <span class="material-symbols-outlined text-5xl mb-4 block text-on-surface-variant">event_busy</span>
                    <p class="text-lg font-bold text-on-surface mb-2">No scheduled posts</p>
                    <p class="text-sm text-on-surface-variant mb-6">Schedule a post to see it here</p>
                    <a href="upload.html" class="inline-flex items-center gap-2 px-8 py-3.5 rounded-xl bg-primary text-on-primary text-sm font-bold hover:bg-primary-dim transition-all">
                        <span class="material-symbols-outlined text-lg">add</span>
                        Create Post
                    </a>
                </div>`;
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post-card scheduled-card bg-surface-container-lowest rounded-xl p-5 ambient-shadow" data-id="${post.id}">
                    <div class="scheduled-media">
                        ${renderMediaPreview(post)}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-start justify-between gap-3 mb-2">
                            <div class="min-w-0">
                                <p class="font-extrabold text-on-surface text-lg leading-snug mb-1">${escapeHtml(getPostTitle(post))}</p>
                                <p class="text-sm text-on-surface-variant caption-preview">${escapeHtml(post.caption || 'No caption')}</p>
                            </div>
                            <span class="meta-chip flex-shrink-0">
                                <span class="material-symbols-outlined text-sm">schedule</span>
                                Scheduled
                            </span>
                        </div>
                        <div class="scheduled-meta">
                            <span class="meta-chip">
                                <span class="material-symbols-outlined text-sm">calendar_today</span>
                                ${escapeHtml(formatScheduledDate(post.scheduled_at))}
                            </span>
                            <span class="meta-chip">
                                <span class="material-symbols-outlined text-sm">${post.metadata?.media_type === 'image' ? 'image' : post.metadata?.media_type === 'video' ? 'movie' : 'notes'}</span>
                                ${escapeHtml(formatMediaLabel(post))}
                            </span>
                        </div>
                        <div class="scheduled-meta">
                            ${(post.platforms || []).map(p => `
                                <span class="platform-chip ${escapeHtml(getTargetPlatform(p))}">
                                    ${PLATFORM_ICONS[getTargetPlatform(p)] || '<i class="fas fa-link"></i>'}
                                    ${escapeHtml(formatPlatformLabel(p, post))}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                    <div class="scheduled-actions flex items-start gap-2 flex-shrink-0">
                        <button onclick="deletePost('${post.id}')" class="w-10 h-10 rounded-xl border border-outline-variant flex items-center justify-center hover:bg-error/5 hover:border-error transition-all text-on-surface-variant hover:text-error" title="Delete">
                            <span class="material-symbols-outlined text-lg">delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderMediaPreview(post) {
            const mediaType = post.metadata?.media_type || '';
            const thumb = post.thumbnail_url || '';
            const media = post.video_url || '';
            if (thumb) return `<img src="${escapeHtml(thumb)}" alt="">`;
            if (mediaType === 'image' && media) return `<img src="${escapeHtml(media)}" alt="">`;
            if (mediaType === 'video' && media) return `<video src="${escapeHtml(media)}" muted preload="metadata"></video>`;
            return '<span class="material-symbols-outlined text-4xl">article</span>';
        }

        function getPostTitle(post) {
            if (post.metadata?.youtube_title) return post.metadata.youtube_title;
            const caption = String(post.caption || '').trim();
            if (!caption) return 'Scheduled post';
            return caption.split('\n').find(line => line.trim())?.slice(0, 90) || 'Scheduled post';
        }

        function getTargetPlatform(target) {
            return String(target || '').split(':')[0];
        }

        function formatPlatformLabel(target, post) {
            const platform = getTargetPlatform(target);
            const accountId = String(target || '').split(':')[1];
            const name = PLATFORM_NAMES[platform] || platform;
            const selected = post.metadata?.account_selections?.[platform] || [];
            if (accountId && selected.length > 1) return `${name} account`;
            return name;
        }

        function formatMediaLabel(post) {
            const type = post.metadata?.media_type;
            const size = Number(post.metadata?.file_size_bytes || 0);
            const typeLabel = type === 'image' ? 'Image' : type === 'video' ? 'Video' : 'Text';
            return size ? `${typeLabel} · ${formatBytes(size)}` : typeLabel;
        }

        function formatBytes(bytes) {
            if (!bytes) return '';
            const mb = bytes / (1024 * 1024);
            if (mb < 1024) return `${mb.toFixed(mb >= 10 ? 0 : 1)} MB`;
            return `${(mb / 1024).toFixed(1)} GB`;
        }

        function formatScheduledDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = date - now;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const days = Math.floor(hours / 24);

            let relative = '';
            if (days > 0) relative = `in ${days} day${days > 1 ? 's' : ''}`;
            else if (hours > 0) relative = `in ${hours} hour${hours > 1 ? 's' : ''}`;
            else relative = 'soon';

            return `${date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })} at ${date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })} (${relative})`;
        }

        window.deletePost = async function(postId) {
            if (!confirm('Delete this scheduled post?')) return;
            const { error } = await supabaseClient.from('posts').delete().eq('id', postId);
            if (error) { alert('Error deleting post'); return; }
            await loadScheduledPosts();
        };

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[char]));
        }
    </script>
</body>
</html>
