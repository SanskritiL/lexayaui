<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Lexaya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link crossorigin rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "primary-dim": "#1d4ed8",
                        "on-primary": "#ffffff",
                        "secondary": "#475569",
                        "on-surface": "#0f172a",
                        "on-surface-variant": "#475569",
                        "surface": "#ffffff",
                        "surface-container-low": "#f8fafc",
                        "surface-container": "#f1f5f9",
                        "outline": "#64748b",
                        "outline-variant": "#cbd5e1"
                    },
                    fontFamily: {
                        "body": ["Manrope"]
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container-low font-body text-on-surface antialiased">

    <!-- Loading State -->
    <div id="loading" class="min-h-screen flex items-center justify-center">
        <div class="flex items-center gap-3 text-slate-400">
            <span class="material-symbols-outlined animate-spin text-primary">progress_activity</span>
            <span class="text-sm font-medium">Loading...</span>
        </div>
    </div>

    <!-- Members Content -->
    <div id="members" style="display: none;">
        <!-- Nav -->
        <nav class="w-full bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
            <div class="flex justify-between items-center px-6 md:px-12 py-5 max-w-[1200px] mx-auto">
                <a href="/" class="text-xl font-black tracking-tighter text-slate-900 no-underline">Lexaya</a>
                <div class="flex items-center gap-4">
                    <span id="user-email" class="text-xs text-slate-400 hidden md:inline"></span>
                    <span id="account-status" class="text-xs font-bold uppercase tracking-widest px-3 py-1.5 rounded-full"></span>
                    <button onclick="handleLogout()" class="text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-primary transition-colors bg-transparent border-none cursor-pointer">
                        Sign Out
                    </button>
                </div>
            </div>
        </nav>

        <!-- Dashboard Content -->
        <div class="max-w-[900px] mx-auto px-6 md:px-12 py-16">
            <!-- Greeting -->
            <div class="text-center mb-12">
                <h1 class="text-3xl md:text-4xl font-bold tracking-tighter text-slate-900">What would you like to do today?</h1>
                <p class="text-slate-500 mt-2">Pick an option to get started</p>
            </div>

            <!-- Actions Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <a href="/broadcast/" class="action-card bg-white border border-slate-200 rounded-xl p-8 flex flex-col items-center text-center hover:border-primary/30 hover:shadow-xl shadow-sm">
                    <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-5">
                        <span class="material-symbols-outlined text-primary text-3xl">share</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-900 mb-2">Lexaya Videos</h3>
                    <p class="text-sm text-slate-500 leading-relaxed">Post to TikTok, Instagram, LinkedIn, and Threads in one click</p>
                </a>

                
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        (async () => {
            const user = await auth.getUser();

            if (!user) {
                window.location.href = '/login.html';
                return;
            }

            const email = user.email || '';
            const userEmailEl = document.getElementById('user-email');
            const accountStatusEl = document.getElementById('account-status');

            if (userEmailEl) userEmailEl.textContent = email;
            if (accountStatusEl) {
                accountStatusEl.textContent = 'Signed In';
                accountStatusEl.className = 'text-xs font-bold uppercase tracking-widest px-3 py-1.5 rounded-full bg-slate-100 text-slate-500';
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('members').style.display = 'block';
        })();

        async function handleLogout() {
            await auth.signOut();
        }
    </script>
</body>
</html>
